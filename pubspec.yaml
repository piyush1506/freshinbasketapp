name: freshinbasket
description: Freshinbasket - Fresh vegetables and fruits delivery.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_secure_storage: ^10.3.1
  image_picker: ^1.0.7
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  razorpay_flutter: ^1.4.5
  http_parser: ^4.1.2
  share_plus: ^12.0.2
  flutter_dotenv: ^5.1.0
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/appicon.jpg"
  remove_alpha_ios: true
flutter:
  uses-material-design: true
  assets:
    - images/
    - .env
